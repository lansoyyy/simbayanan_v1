<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="https://lansoyyy.github.io/simbayanan_v1/">
  <!-- <base href="/"> -->

  <!-- GitHub Pages SPA: restore path encoded by 404.html -->
  <script>
    (function(l) {
      if (l.search[1] === '?p=') return;
      var p = l.search.slice(1).split('&');
      var path = '';
      var query = '';
      for (var i = 0; i < p.length; i++) {
        if (p[i].slice(0, 2) === 'p=') {
          path = '/' + p[i].slice(2).replace(/~and~/g, '&');
        } else if (p[i].slice(0, 2) === 'q=') {
          query = '?' + p[i].slice(2).replace(/~and~/g, '&');
        }
      }
      if (path) {
        window.history.replaceState(null, null,
          l.pathname.replace(/\/$/, '') + '/' + path.replace(/^\//, '') + query + l.hash
        );
      }
    }(window.location));
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="uride Admin Panel for managing rides, deliveries, drivers, and customers.">

  <!-- Prevent caching - always load latest version -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="uride Admin">
  <link rel="apple-touch-icon" href="assets/images/logo.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.jpg"/>

  <title>uride Admin</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
